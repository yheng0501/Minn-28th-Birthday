<!DOCTYPE html>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #000;
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif;
        }

        /* 第一層：詢問畫面 */
        #overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 100;
            transition: opacity 1s ease;
        }

        #overlay h2 {
            color: white;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }

        .btn-group {
            display: flex;
            gap: 20px;
        }

        button {
            padding: 10px 30px;
            font-size: 1.2rem;
            cursor: pointer;
            border-radius: 25px;
            border: none;
            transition: 0.3s;
        }

        #yes-btn {

        }

        #no-btn {

            color: #ccc;
        }

        button:hover {
            transform: scale(1.1);
        }

        /* 第二層：主要動畫內容 (預設隱藏) */
        #main-content {
            opacity: 0;
            transition: opacity 2s ease;
        }

        canvas {
            display: block;
            position: absolute;
            top: 0;
            left: 0;
            z-index: 1;
        }

        #content-layer {
            position: absolute;
            top: 45%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 10;
            width: 100%;
        }

        /* 修改：照片尺寸放大至 350px */
        .slideshow-container {
            position: relative;
            width: 350px; 
            height: 350px;
            margin: 0 auto 30px;
            perspective: 1200px;
        }

        .photo {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            border: 5px solid #fff;
            border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.8);
            opacity: 0;
            transition: opacity 1.5s ease-in-out;
        }

        .photo.active {
            opacity: 1;
            animation: float 5s ease-in-out infinite;
        }

        h1 {
            font-size: 1.8rem;
            letter-spacing: 3px;
            text-shadow: 0 0 15px #ff69b4;
            margin-top: 20px;
            padding: 0 20px;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(-2deg); }
            50% { transform: translateY(-20px) rotate(2deg); }
        }
    </style>
</head>
<body>

    <script>
        const yesBtn = document.getElementById('yes-btn');
        const overlay = document.getElementById('overlay');
        const mainContent = document.getElementById('main-content');
        let animationStarted = false;

        // 點擊 Yes 啟動動畫
        yesBtn.addEventListener('click', () => {
            overlay.style.opacity = '0';
            setTimeout(() => {
                overlay.style.display = 'none';
                mainContent.style.opacity = '1';
                startAnimation(); // 啟動愛心雨
            }, 1000);
        });

        // 1. 照片輪播邏輯
        let currentIdx = 0;
        const photos = document.querySelectorAll('.photo');
        function showNextPhoto() {
            if(!animationStarted) return;
            photos[currentIdx].classList.remove('active');
            currentIdx = (currentIdx + 1) % photos.length;
            photos[currentIdx].classList.add('active');
        }
        setInterval(showNextPhoto, 4000);

        // 2. 愛心雨邏輯
        const canvas = document.getElementById('heartCanvas');
        const ctx = canvas.getContext('2d');
        let hearts = [];
        const heartCount = 100;

        class Heart {
            constructor() { this.reset(); }
            reset() {
                this.x = Math.random() * canvas.width;
                this.spawnFromTop = Math.random() > 0.5; 
                this.y = this.spawnFromTop ? -20 : canvas.height + 20;
                this.size = Math.random() * 10 + 5;
                this.speed = Math.random() * 1.5 + 0.5;
                this.direction = this.spawnFromTop ? 1 : -1;
                this.opacity = Math.random() * 0.6 + 0.4;
                this.wind = Math.random() * 0.5 - 0.25;
            }
            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.fillStyle = '#ffb6c1';
                ctx.shadowBlur = 10;
                ctx.shadowColor = '#ff69b4';
                ctx.beginPath();
                const x = this.x, y = this.y, s = this.size;
                ctx.moveTo(x, y + s / 4);
                ctx.bezierCurveTo(x, y, x - s, y, x - s, y + s / 4);
                ctx.bezierCurveTo(x - s, y + (s * 2) / 3, x, y + s, x, y + s * 1.2);
                ctx.bezierCurveTo(x, y + s, x + s, y + (s * 2) / 3, x + s, y + s / 4);
                ctx.bezierCurveTo(x + s, y, x, y, x, y + s / 4);
                ctx.fill();
                ctx.restore();
            }
            update() {
                this.y += this.speed * this.direction;
                this.x += this.wind;
                if (this.y > canvas.height + 50 || this.y < -50) this.reset();
            }
        }

        function startAnimation() {
            animationStarted = true;
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            for (let i = 0; i < heartCount; i++) hearts.push(new Heart());
            animate();
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            hearts.forEach(h => { h.update(); h.draw(); });
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });
    </script>
</body>
