<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday!</title>
    <style>
        body { 
            margin: 0; 
            overflow-x: hidden;
            overflow-y: auto; 
            background-color: #000; 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
        }

        /* 詢問畫面 */
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 100;
            transition: opacity 1s;
        }
        #overlay h2 { color: white; margin-bottom: 10px; text-align: center; padding: 0 20px; font-size: 1.2rem; }
        button { padding: 12px 35px; font-size: 1.1rem; cursor: pointer; border-radius: 30px; border: none; transition: 0.3s; }
        #yes-btn { background: #ff69b4; color: white; box-shadow: 0 0 15px #ff69b4; margin-right: 15px; }
        #no-btn { background: #444; color: #ccc; }

        /* 愛心背景固定在最底層 */
        canvas { display: block; position: fixed; top: 0; left: 0; z-index: 1; pointer-events: none; }

        #main-content { 
            opacity: 0; 
            transition: opacity 1.5s; 
            position: relative; 
            z-index: 5; 
            width: 100%; 
            display: none; 
        }

        /* 文字與照片的容器：修正置中 */
        #content-layer {
            position: relative;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center; 
            text-align: center; 
            color: white; 
            width: 90%; 
            max-width: 600px; 
            margin: 0 auto; 
        }

        /* 照片容器：改為隨網頁滾動 */
        .slideshow-container {
            position: relative; 
            width: 280px; /* 適中大小，適合多數手機 */
            height: 280px;
            margin: 50px auto 20px auto; 
            perspective: 1000px;
            flex-shrink: 0; /* 防止被擠壓 */
        }

        .photo {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            object-fit: cover; border: 5px solid #fff; border-radius: 15px;
            box-shadow: 0 0 30px rgba(255, 105, 180, 0.7);
            opacity: 0; transition: opacity 1s;
        }
        .photo.active { opacity: 1; animation: float 5s ease-in-out infinite; }

        h1 { 
            font-size: 1.6rem; 
            text-shadow: 0 0 10px #ff69b4; 
            margin: 20px 0;
            line-height: 1.4;
        }
        
        .long-text {
            font-size: 1.05rem;
            line-height: 2;
            color: #fff;
            padding: 0 10px 100px 10px; 
            white-space: pre-wrap;
            word-wrap: break-word; 
            text-align: center;
        }

        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
